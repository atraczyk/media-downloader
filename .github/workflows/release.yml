name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag matches package.json
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.ref_name }}" != "${{ steps.version.outputs.tag }}" ]; then
            echo "Tag mismatch: pushed '${{ github.ref_name }}' but package.json is '${{ steps.version.outputs.tag }}'"
            exit 1
          fi

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            package_script: package:win
          - os: macos-latest
            package_script: package:mac
          - os: ubuntu-latest
            package_script: package:linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable
        run: npm run ${{ matrix.package_script }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [resolve-version, build]
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: release-artifacts/**/*
